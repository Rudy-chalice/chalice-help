<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Sell-side decisioning flow. Publisher bid requests pass through the Chalice Bidding Agent on the sell side, which shapes demand and supply and scores every impression, producing a curated PMP deal. Your DV360 line item then bids on that deal from the buy side.">
  <title>How Chalice sell-side decisioning reaches your DV360 line item</title>
  <defs>
    <marker id="ssd-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#616161"/>
    </marker>
  </defs>

  <!-- Zones -->
  <rect x="14" y="70" width="616" height="186" rx="14" fill="#FFF8E1" stroke="#FFE082" stroke-width="1.5"/>
  <rect x="650" y="70" width="236" height="186" rx="14" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Zone labels -->
  <text x="32" y="56" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2" fill="#8D6E00">SELL SIDE &#183; UPSTREAM, CLOSEST TO THE IMPRESSION</text>
  <text x="668" y="56" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2" fill="#616161">BUY SIDE</text>

  <!-- Box 1: Publisher bid requests -->
  <rect x="34" y="125" width="150" height="80" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="109" y="160" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#111111">Publisher</text>
  <text x="109" y="182" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#111111">bid requests</text>

  <!-- Box 2: Chalice Bidding Agent (amber container) -->
  <rect x="242" y="125" width="180" height="80" rx="10" fill="#FFB300" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="332" y="160" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">Chalice</text>
  <text x="332" y="182" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">Bidding Agent</text>
  <text x="332" y="228" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#5D4A00">Containerized decisioning</text>
  <text x="332" y="244" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#5D4A00">scores every impression in real time</text>

  <!-- Box 3: Curated PMP deal -->
  <rect x="474" y="125" width="140" height="80" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="544" y="160" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#111111">Curated</text>
  <text x="544" y="182" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#111111">PMP deal</text>

  <!-- Box 4: Your DV360 line item -->
  <rect x="686" y="125" width="164" height="80" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="768" y="160" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#111111">Your DV360</text>
  <text x="768" y="182" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#111111">line item</text>
  <text x="768" y="228" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#616161">bids on the deal</text>

  <!-- Arrows -->
  <line x1="186" y1="165" x2="238" y2="165" stroke="#616161" stroke-width="2" marker-end="url(#ssd-arrow)"/>
  <line x1="424" y1="165" x2="470" y2="165" stroke="#616161" stroke-width="2" marker-end="url(#ssd-arrow)"/>
  <line x1="616" y1="165" x2="682" y2="165" stroke="#616161" stroke-width="2" marker-end="url(#ssd-arrow)"/>
</svg>
