site_name: Chalice Help Center
site_description: Setup guides and documentation for activating Chalice across your platforms.
site_url: https://help.chalice.ai/

theme:
  name: material
  logo: assets/logo.png
  palette:
    scheme: default
    primary: black
    accent: amber
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Running Display: getting-started/running-display.md
  - The Trade Desk:
      - the-trade-desk/index.md
  - DV360:
      - dv360/index.md
      - Accepting a PMP Deal: dv360/accepting-a-pmp-deal.md
      - Line Item Setup Guide for PMP Deals: dv360/line-item-setup-guide-pmp.md
      - Opting into the Appropriate Exchange: dv360/opting-into-the-appropriate-exchange.md
  - Yahoo DSP:
      - yahoo-dsp/index.md
  - Pontiac:
      - pontiac/index.md
  - Index Exchange:
      - index-exchange/index.md
  - OpenX:
      - openx/index.md
